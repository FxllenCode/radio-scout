# cargo-nextest configuration (ADR-0010). The default local profile is fast and
# quiet; the `ci` profile retries flaky timing-sensitive tests (the WebSocket /
# live-feed suite) and emits JUnit for CI (#22).
[profile.default]
# A test that only passes on retry is reported flaky, not green.
retries = 0
# The live-feed tests use short timeouts; flag anything that hangs.
slow-timeout = { period = "30s", terminate-after = 2 }

[profile.ci]
retries = 2
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci.junit]
path = "junit.xml"
